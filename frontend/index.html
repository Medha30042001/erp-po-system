<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PO Dashboard</title>
    
    <link 
        rel="stylesheet" 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="bg-light">
    <div class="container py-4">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">Purchase Orders Dashboard</h1>
        <a href="create-po.html" class="btn btn-primary">Create New PO</a>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="h5 mb-3">All Purchase Orders</h2>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Reference No</th>
                            <th>Vendor Name</th>
                            <th>Total Amount</th>
                            <th>Status</th>
                            <th>Created At</th>
                        </tr>
                    </thead>
                    <tbody id="poTableBody">
                        <tr>
                            <td colspan="5" class="text-center">Loading purchase orders...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
        </div>
      </div>

    </div>

    <script src="app.js"></script>
  </body>
</html>
