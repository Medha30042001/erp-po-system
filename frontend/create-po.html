<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Purchase Order</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-light">
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h3">Create New Purchase Order</h1>
      <a href="index.html" class="btn btn-secondary">Back to Dashboard</a>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <form id="purchaseOrderForm">
          <div class="mb-3">
            <label for="vendorSelect" class="form-label">Select Vendor</label>
            <select id="vendorSelect" class="form-select" required>
              <option value="">Loading vendors...</option>
            </select>
          </div>

          <h2 class="h5 mt-4">Order Items</h2>

          <div id="itemsContainer"></div>

          <div class="d-flex gap-2 mt-3">
            <button type="button" id="addRowBtn" class="btn btn-outline-primary">
              Add Product Row
            </button>
            <button type="submit" class="btn btn-success">
              Create Purchase Order
            </button>
          </div>
        </form>

        <div id="messageBox" class="mt-4"></div>
      </div>
    </div>
  </div>

  <script src="create-po.js"></script>
</body>
</html>
